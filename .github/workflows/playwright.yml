name: Playwright - run all end-to-end tests
on:
    workflow_call:
        inputs:
            browser:
                description: 'Playwright project to run (chromium, webkit, ...)'
                type: string
                default: chromium
            runner:
                description: 'GitHub runner to run on (ubuntu-latest, macos-latest, ...)'
                type: string
                default: ubuntu-latest

jobs:
    test:
        name: test (${{ inputs.browser }})
        timeout-minutes: 60
        runs-on: ${{ inputs.runner }}
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Resolve Playwright version
              id: playwright-version
              run: echo "version=$(npx playwright --version | tr ' ' '-')" >> "$GITHUB_OUTPUT"
            - name: Cache Playwright browsers
              uses: actions/cache@v5
              with:
                  # The browser cache lives at a different path on Linux vs macOS;
                  # list both so the same step works on either runner (the key
                  # includes runner.os, so each OS keeps a separate entry).
                  path: |
                      ~/.cache/ms-playwright
                      ~/Library/Caches/ms-playwright
                  key: ${{ runner.os }}-ms-playwright-${{ inputs.browser }}-${{ steps.playwright-version.outputs.version }}
            - name: Install Playwright browsers
              # On a cache hit the browser binary is already present, so this
              # mainly installs the system deps (they live outside the cached
              # dir); on a miss it downloads the binary too.
              run: npx playwright install --with-deps ${{ inputs.browser }}
            - run: echo "${{ secrets.ENV_DEMO }}" > .env
            - run: echo "${{ secrets.FUNCTIONS_ENV_DEMO }}" > functions/.env && echo "SMTP_PASSWORD=" >> functions/.env
            - name: Set up JDK 21 # Firebase emulator requires >=21
              uses: actions/setup-java@v5
              with:
                  java-version: '21'
                  distribution: 'temurin'
            - name: Cache Firebase emulators
              uses: actions/cache@v5
              with:
                  path: ~/.cache/firebase/emulators
                  # Include the lockfile hash so a firebase-tools bump invalidates
                  # the cached emulator jars instead of reusing stale ones.
                  key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('package-lock.json') }}
                  restore-keys: ${{ runner.os }}-firebase-emulators-
            - name: Build project
              run: npm run build:ci
            - name: Run end-to-end tests with emulator
              run: npx firebase emulators:exec "npx playwright test --project=${{ inputs.browser }} --reporter=list" --project=demo-wordplay --log-verbosity QUIET
            - uses: actions/upload-artifact@v6
              if: always()
              with:
                  name: playwright-report-${{ inputs.browser }}
                  path: test-results/
                  retention-days: 30
                  # A fully green run writes nothing to test-results/ (traces are
                  # on-first-retry, screenshots only-on-failure), so don't warn
                  # when there's nothing to upload.
                  if-no-files-found: ignore
