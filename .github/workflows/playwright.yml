name: Playwright - run all end-to-end tests
on:
    workflow_call:
        inputs:
            browser:
                description: 'Playwright project to run (chromium, webkit, ...)'
                type: string
                default: chromium
            runner:
                description: 'GitHub runner to run on (ubuntu-latest, macos-latest, ...)'
                type: string
                default: ubuntu-latest

jobs:
    test:
        name: test (${{ inputs.browser }} ${{ matrix.shard }}/3)
        timeout-minutes: 60
        runs-on: ${{ inputs.runner }}
        # Split the spec files into three parallel shards. Each shard pays the
        # same fixed setup cost (~75s: npm ci, build, browser install, emulator
        # startup) but only runs a third of the tests, so the e2e step shrinks
        # while setup overlaps — the main lever for keeping the deploy pipeline
        # under 5 minutes. Three is the practical limit: that fixed per-shard
        # floor means more shards stop helping (the gate can't drop below ~90s
        # no matter how many). fail-fast is off so one shard's failure doesn't
        # cancel the others' reports (the deploy gate already fails if any
        # shard fails).
        strategy:
            fail-fast: false
            matrix:
                shard: [1, 2, 3]
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Resolve Playwright version
              id: playwright-version
              run: echo "version=$(npx playwright --version | tr ' ' '-')" >> "$GITHUB_OUTPUT"
            - name: Cache Playwright browsers
              uses: actions/cache@v5
              with:
                  # The browser cache lives at a different path on Linux vs macOS;
                  # list both so the same step works on either runner (the key
                  # includes runner.os, so each OS keeps a separate entry).
                  path: |
                      ~/.cache/ms-playwright
                      ~/Library/Caches/ms-playwright
                  key: ${{ runner.os }}-ms-playwright-${{ inputs.browser }}-${{ steps.playwright-version.outputs.version }}
            - name: Install Playwright browsers
              # On a cache hit the browser binary is already present, so this is
              # a near-no-op; on a miss it downloads the binary. We omit
              # --with-deps: the ubuntu-latest image already ships the system
              # libraries Chromium needs, and reinstalling them via apt every run
              # cost ~15s. If a future runner image drops a dependency, add
              # --with-deps back (or `npx playwright install-deps`).
              run: npx playwright install ${{ inputs.browser }}
            - run: echo "${{ secrets.ENV_DEMO }}" > .env
            - run: echo "${{ secrets.FUNCTIONS_ENV_DEMO }}" > functions/.env && echo "SMTP_PASSWORD=" >> functions/.env
            - name: Set up JDK 21 # Firebase emulator requires >=21
              uses: actions/setup-java@v5
              with:
                  java-version: '21'
                  distribution: 'temurin'
            - name: Cache Firebase emulators
              uses: actions/cache@v5
              with:
                  path: ~/.cache/firebase/emulators
                  # Include the lockfile hash so a firebase-tools bump invalidates
                  # the cached emulator jars instead of reusing stale ones.
                  key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('package-lock.json') }}
                  restore-keys: ${{ runner.os }}-firebase-emulators-
            - name: Build project
              run: npm run build:ci
            - name: Run end-to-end tests with emulator
              run: npx firebase emulators:exec "npx playwright test --project=${{ inputs.browser }} --shard=${{ matrix.shard }}/3 --reporter=list" --project=demo-wordplay --log-verbosity QUIET
            - uses: actions/upload-artifact@v6
              if: always()
              with:
                  name: playwright-report-${{ inputs.browser }}-shard${{ matrix.shard }}
                  path: test-results/
                  retention-days: 30
                  # A fully green run writes nothing to test-results/ (traces are
                  # on-first-retry, screenshots only-on-failure), so don't warn
                  # when there's nothing to upload.
                  if-no-files-found: ignore
