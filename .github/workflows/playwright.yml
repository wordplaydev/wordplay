name: Playwright - run all end-to-end tests
on:
    workflow_call:

jobs:
    test:
        name: test (${{ matrix.browser }})
        timeout-minutes: 60
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                browser: [chromium, firefox]
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright browsers
              run: npx playwright install --with-deps ${{ matrix.browser }}
            - run: echo "${{ secrets.ENV_DEMO }}" > .env
            - run: echo "${{ secrets.FUNCTIONS_ENV_DEMO }}" > functions/.env && echo "SMTP_PASSWORD=" >> functions/.env
            - name: Set up JDK 21 # Firebase emulator requires >=21
              uses: actions/setup-java@v5
              with:
                  java-version: '21'
                  distribution: 'temurin'
            - name: Cache Firebase emulators
              uses: actions/cache@v5
              with:
                  path: ~/.cache/firebase/emulators
                  key: ${{ runner.os }}-firebase-emulators
            - name: Build project
              run: npm run build
            - name: Run end-to-end tests with emulator
              run: npx firebase emulators:exec "npx playwright test --project=${{ matrix.browser }} --reporter=list" --project=demo-wordplay --log-verbosity QUIET
            - uses: actions/upload-artifact@v6
              if: always()
              with:
                  name: playwright-report-${{ matrix.browser }}
                  path: test-results/
                  retention-days: 30
