name: Verify and deploy to Firebase
on:
    push:
        branches:
            - main
jobs:
    unit:
        uses: ./.github/workflows/unit.yml

    playwright:
        uses: ./.github/workflows/playwright.yml
        secrets: inherit

    deploy:
        needs: [unit, playwright]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: '22'
                  cache: 'npm'

            # Set up authentication for Firebase deployment using a service account
            - uses: 'google-github-actions/auth@v3'
              with:
                  credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WORDPLAY_PROD }}'

            # Install dependencies. firebase-tools is a devDependency, so this
            # also provides the `firebase` CLI (invoked via `npx` below) — no
            # separate global install needed.
            - run: npm ci
              name: Install dependencies

              # Set up environment variables from GitHub secrets
            - run: echo "${{ secrets.FUNCTIONS_ENV_PROD }}" > functions/.env
              name: Copy function environment variables
            - run: echo "${{ secrets.ENV_PROD }}" > .env.wordplay-prod
              name: Copy environment variables

            # Deploy functions, Firestore rules/indexes, and hosting in a single
            # command. Uses the firebase CLI rather than
            # FirebaseExtended/action-hosting-deploy, which had no Node 24
            # release (deprecated Node 20), and authenticates via the
            # google-github-actions/auth step above. One invocation lets the CLI
            # overlap the release phases; the predeploy hooks still build
            # functions (tsc) and the site (`npm run build:web`) before upload.
            #
            # Note: a combined deploy gives no ordering guarantee that functions
            # finish before hosting goes live, so there is a brief window where a
            # freshly deployed client could call not-yet-updated functions. This
            # is acceptable as long as function changes are backward-compatible;
            # if that stops holding, split functions into its own prior step.
            - run: npx firebase deploy --project wordplay-prod
              name: Deploy to Firebase
