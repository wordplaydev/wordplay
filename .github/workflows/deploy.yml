name: Verify and deploy to Firebase
on:
    push:
        branches:
            - main
jobs:
    unit:
        uses: ./.github/workflows/unit.yml

    playwright:
        uses: ./.github/workflows/playwright.yml
        secrets: inherit

    deploy:
        needs: [unit, playwright]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: '22'
                  cache: 'npm'

            # Set up authentication for Firebase deployment using a service account
            - uses: 'google-github-actions/auth@v3'
              with:
                  credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WORDPLAY_PROD }}'

            # Install dependencies. firebase-tools is a devDependency, so this
            # also provides the `firebase` CLI (invoked via `npx` below) — no
            # separate global install needed.
            - run: npm ci
              name: Install dependencies

              # Set up environment variables from GitHub secrets
            - run: echo "${{ secrets.FUNCTIONS_ENV_PROD }}" > functions/.env
              name: Copy function environment variables
            - run: echo "${{ secrets.ENV_PROD }}" > .env.wordplay-prod
              name: Copy environment variables

            # Deploy Firebase functions first, so they are ready for source to invoke.
            - run: npx firebase deploy --only functions --project wordplay-prod

            # Deploy Firestore rules and indexes so they match the hosted client.
            - run: npx firebase deploy --only firestore --project wordplay-prod

            # Deploy to Firebase hosting (live channel). Uses the firebase CLI
            # rather than FirebaseExtended/action-hosting-deploy, which had no
            # Node 24 release (deprecated Node 20). This mirrors the functions
            # and firestore steps above and authenticates via the same
            # google-github-actions/auth step. firebase.json's hosting predeploy
            # hook runs `npm run build:web`, so the site is built before upload.
            - run: npx firebase deploy --only hosting --project wordplay-prod
              name: Deploy to Firebase hosting
