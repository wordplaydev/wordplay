<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:url" content="https://wordplay.dev" />
        <meta property="og:type" content="website" />
        <meta
            name="title"
            property="og:title"
            content="Wordplay: Accessible, Multilingual, Programmable Typography"
        />
        <meta
            name="description"
            property="og:description"
            content="An educational programming language for creating interactive typographic media with code."
        />
        <meta
            name="image"
            property="og:image"
            content="https://wordplay.dev/icons/icon.png"
        />
        <meta property="og:image:alt" content="Wordplay chat bubble icon" />
        <link rel="icon" href="%sveltekit.assets%/icons/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="%sveltekit.assets%/icons/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="%sveltekit.assets%/icons/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="%sveltekit.assets%/icons/favicon-16x16.png"
        />
        <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!--
            Preload the fonts the landing page needs so document.fonts.ready resolves
            before the "Loading fonts" overlay would appear: regular and bold Latin
            Noto Sans (body text, h1/h2), and the all-in-one Noto Emoji file (it's
            font-display: block, so it gates first paint until loaded). URLs must
            match the @font-face rules in /fonts.css exactly — including the
            crossorigin attribute — for the browser to reuse the preloaded bytes.
        -->
        <link
            rel="preload"
            href="/fonts/NotoSans/NotoSans-400-7.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="/fonts/NotoSans/NotoSans-700-7.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="/fonts/NotoEmoji/NotoEmoji-400.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />

        <link rel="stylesheet" href="/fonts.css" />

        <style>
            :root {
                --color-blue: #648fff;
                --color-blue-transparent: color-mix(
                    in srgb,
                    var(--color-blue) 10%,
                    transparent
                );
                --color-purple: #785ef0;
                --color-purple-transparent: color-mix(
                    in srgb,
                    var(--color-purple) 10%,
                    transparent
                );
                --color-pink: #dc267f;
                --color-pink-transparent: color-mix(
                    in srgb,
                    var(--color-pink) 2%,
                    transparent
                );
                --color-orange: #fe6100;
                --color-orange-transparent: #fe61004b;
                --color-yellow: #c88800;
                --color-yellow-transparent: #ffb0004b;
                --color-white: #ffffff;
                --color-black: #000000;
                --color-light-grey: #9f9f9f;
                --color-light-grey-transparent: #9f9f9f36;
                --color-very-light-grey: #f3f3f3;
                --color-dark-grey: #303030;
                --color-shadow: rgb(0, 0, 0, 0.2);
                --color-shadow-transparent: rgb(0, 0, 0, 0.05);

                /* Colors */
                --wordplay-foreground: var(--color-black);
                --wordplay-background: var(--color-white);
                --wordplay-header: var(--color-dark-grey);
                --wordplay-chrome: var(--color-light-grey);
                --wordplay-border-color: var(--color-light-grey);
                --wordplay-evaluation-color: var(--color-pink);
                --wordplay-highlight-color: var(--color-yellow);
                --wordplay-focus-color: var(--color-blue);
                --wordplay-hover: var(--color-yellow);
                --wordplay-hover-light: var(--color-yellow-transparent);
                --wordplay-error: var(--color-orange);
                --wordplay-error-text-color: var(--color-white);
                --wordplay-warning: var(--color-yellow);
                --wordplay-inactive-color: var(--color-light-grey);
                --wordplay-alternating-color: var(--color-very-light-grey);
                --wordplay-doc-color: var(--color-purple);
                --wordplay-doc-color-light: var(--color-purple-transparent);
                --wordplay-relation-color: var(--color-orange);
                --wordplay-operator-color: var(--color-orange);
                --wordplay-type-color: var(--color-orange);

                /* Fonts */
                --wordplay-app-font:
                    'Noto Sans', 'Noto Color Emoji', 'Noto Emoji', sans-serif;
                --wordplay-code-font:
                    'Noto Sans Mono', 'Noto Sans', 'Noto Color Emoji',
                    'Noto Emoji', monospace;

                /* Spacing */
                --wordplay-editor-indent: 3em;
                --wordplay-editor-radius: 3px;
                --wordplay-spacing: 0.5rem;
                --wordplay-spacing-half: 0.25rem;
                /* Block-editor density. Defaults match 'normal'; .editor.density-{compact|spacious} overrides below. */
                --wordplay-block-padding-block: 0.25rem;
                --wordplay-block-padding-inline: 0.25rem;
                --wordplay-block-insertion-margin: 0.25rem;
                --wordplay-font-weight: 400;
                --wordplay-font-size: 12pt;
                --wordplay-small-font-size: 10pt;
                --wordplay-border-width: 1px;
                --wordplay-focus-width: 4px;
                --wordplay-border-radius: 8px;
                --wordplay-code-line-height: 1.6;
                --wordplay-palette-min-width: 5em;
                --wordplay-palette-max-width: 15em;
                --wordplay-widget-height: 1.5em;
                --wordplay-min-line-height: 3ex;

                --bounce-height: 0.2em;
                --wobble-rotation: 2deg;
            }

            /* Block-editor density overrides. Vertical compresses more aggressively
               than horizontal because 2px horizontal padding cramps adjacent tokens. */
            .editor.density-compact {
                --wordplay-block-padding-block: 0.125rem;
                --wordplay-block-padding-inline: 0.25rem;
                --wordplay-block-insertion-margin: 0.125rem;
            }
            .editor.density-spacious {
                --wordplay-block-padding-block: 0.5rem;
                --wordplay-block-padding-inline: 0.5rem;
                --wordplay-block-insertion-margin: 0.5rem;
            }

            @media (prefers-color-scheme: dark) {
                :root:not(.light) {
                    --color-blue: #3a72fe;
                    --color-blue-transparent: #0f1e45;
                    --color-purple: #c7b4ff;
                    --color-purple-transparent: #261862;
                    --color-pink: #ee68a9;
                    --color-pink-transparent: rgb(77, 15, 45);
                    --color-orange: #ff5e00;
                    --color-yellow: #b67c00;
                    --color-yellow-transparent: #b67c004b;
                    --color-white: #000000;
                    --color-black: #ffffff;
                    --color-light-grey: #6d6d6d;
                    --color-very-light-grey: #373636;
                    --color-dark-grey: #eaeaea;
                    --color-shadow: rgba(227, 227, 227, 0.8);
                    --color-shadow-transparent: rgba(227, 227, 227, 0.15);
                }
            }

            /* This is duplciated above because we want to avoid a flash on load. Dark mode values need
             to be updated in both places.*/
            :root.dark {
                --color-blue: #3a72fe;
                --color-blue-transparent: #0f1e45;
                --color-purple: #c7b4ff;
                --color-purple-transparent: #261862;
                --color-pink: #ee68a9;
                --color-pink-transparent: rgb(77, 15, 45);
                --color-orange: #ff5e00;
                --color-yellow: #b67c00;
                --color-yellow-transparent: #b67c004b;
                --color-white: #000000;
                --color-black: #ffffff;
                --color-light-grey: #6d6d6d;
                --color-very-light-grey: #373636;
                --color-dark-grey: #eaeaea;
                --color-shadow: rgba(227, 227, 227, 0.8);
                --color-shadow-transparent: rgba(227, 227, 227, 0.15);
            }

            @keyframes wobble {
                0% {
                    transform: rotate(var(--wobble-rotation));
                }
                50% {
                    transform: rotate(calc(-1 * var(--wobble-rotation)));
                }
                100% {
                    transform: rotate(var(--wobble-rotation));
                }
            }

            @keyframes throb {
                0% {
                    opacity: 0.8;
                }
                50% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.8;
                }
            }

            @keyframes shift {
                0% {
                    transform: translateX(2px);
                }
                50% {
                    transform: translateX(-2px);
                }
                100% {
                    transform: translateX(2px);
                }
            }

            @keyframes bounce {
                0% {
                    transform: scale(1, 1) translateY(0);
                }
                10% {
                    transform: scale(1.1, 0.9) translateY(0);
                }
                30% {
                    transform: scale(0.9, 1.1)
                        translateY(calc(-1 * var(--bounce-height)));
                }
                50% {
                    transform: scale(1.05, 0.95) translateY(0);
                }
                57% {
                    transform: scale(1, 1) translateY(-7px);
                }
                64% {
                    transform: scale(1, 1) translateY(0);
                }
                100% {
                    transform: scale(1, 1) translateY(0);
                }
            }

            @keyframes ybounce {
                0% {
                    transform: scaleY(1) translateY(0);
                }
                10% {
                    transform: scaleY(0.9) translateY(0);
                }
                30% {
                    transform: scaleY(1.1)
                        translateY(calc(-1 * var(--bounce-height)));
                }
                50% {
                    transform: scaleY(0.95) translateY(0);
                }
                57% {
                    transform: scaleY(1) translateY(-7px);
                }
                64% {
                    transform: scaleY(1) translateY(0);
                }
                100% {
                    transform: scaleY(1) translateY(0);
                }
            }

            @keyframes pulse {
                0% {
                    stroke-width: var(--wordplay-focus-width);
                }

                70% {
                    stroke-width: var(--wordplay-border-width);
                }

                100% {
                    stroke-width: var(--wordplay-focus-width);
                }
            }

            @keyframes shake {
                10%,
                90% {
                    transform: translate3d(-1px, 0, 0);
                }

                20%,
                80% {
                    transform: translate3d(2px, 0, 0);
                }

                30%,
                50%,
                70% {
                    transform: translate3d(-4px, 0, 0);
                }

                40%,
                60% {
                    transform: translate3d(4px, 0, 0);
                }
            }

            @keyframes squish {
                10%,
                90% {
                    transform: translate3d(0, -1px, 0);
                }
                20%,
                80% {
                    transform: translate3d(0px, 2px, 0);
                }
                30%,
                50%,
                70% {
                    transform: translate3d(0, -4px, 0) scale(1, 1.25);
                }
                40%,
                60% {
                    transform: translate3d(0, 4px, 0) scale(1, 0.5);
                }
            }

            /* Applied by locale-preload.js when the preferred locale is not en-US,
               removed by +layout.svelte once the correct locale has loaded. */
            html.locale-loading > body {
                visibility: hidden;
            }

            body {
                background-color: var(--wordplay-background);
                padding: 0;
                margin: 0;
            }

            html {
                box-sizing: border-box;
            }

            * {
                box-sizing: inherit;
            }

            h1,
            h2,
            h3 {
                margin-bottom: var(--wordplay-spacing);
                margin-top: 0;
                transform: rotate(-1deg);
            }

            h1:not(:first-of-type),
            h2:not(:first-of-type),
            h3:not(:first-of-type) {
                margin-top: calc(2 * var(--wordplay-spacing));
            }

            h1 {
                font-size: calc(var(--wordplay-font-size) + 3pt);
                font-weight: bold;
            }

            h2 {
                font-size: calc(var(--wordplay-font-size) + 1pt);
                font-weight: bold;
            }

            h3 {
                font-size: var(--wordplay-font-size);
                font-style: italic;
                font-weight: normal;
            }

            p {
                margin-block-start: 0;
                margin-block-end: 1.5em;
            }

            p:last-child {
                margin-block-end: 0;
            }

            p,
            li {
                line-height: 1.5;
            }

            li:not(:last-of-type) {
                margin-block-end: var(--wordplay-spacing-half);
            }

            a:hover {
                text-decoration: underline;
            }

            *:focus {
                outline: var(--wordplay-focus-color) solid
                    var(--wordplay-focus-width);
            }

            body:focus {
                outline: none;
            }

            table {
                border-collapse: collapse;
                border: var(--wordplay-border-color) solid
                    var(--wordplay-border-width);
            }

            td,
            th {
                padding: var(--wordplay-spacing);
                text-align: start;
            }

            th {
                font-weight: normal;
                font-style: italic;
            }

            tr:nth-child(odd) {
                background: var(--wordplay-alternating-color);
            }

            noscript {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            noscript p {
                margin-block-start: 20%;
                margin-block-end: auto;
                width: 50%;
                text-align: center;
            }

            hr {
                width: 100%;
                height: var(--wordplay-border-width);
                border: none;
                border-bottom: var(--wordplay-border-width) solid
                    var(--wordplay-border-color);
            }

            a {
                color: var(--wordplay-highlight-color);
                text-decoration: none;
                /* In case a parent disables pointer events, we need to enable them here. */
                pointer-events: auto;
            }

            /* Links in paragraphs should have underlines for visibility. */
            p > a {
                text-decoration: calc(var(--wordplay-focus-width) / 2) underline
                    var(--wordplay-highlight-color);
            }

            a:focus,
            a:hover {
                outline: none;
                text-decoration: underline;
                text-decoration-thickness: var(--wordplay-focus-width);
                text-decoration-color: var(--wordplay-focus-color);
            }
        </style>

        %sveltekit.head%
    </head>
    <body>
        <noscript>
            <p
                >Wordplay uses JavaScript. Your browser doesn't support it, or
                it is disabled.</p
            >
        </noscript>
        <script src="/scripts/locale-preload.js"></script>
        <div>%sveltekit.body%</div>
        <div id="unsupported" style="display: none; margin: 1em">
            <h1>Unsupported Browser</h1>
            <p>
                Your browser doesn't support critical functionality. To use
                Wordplay, you'll need to upgrade to a more recent version.</p
            >
        </div>
        <script src="/scripts/unsupported.js"></script>
    </body>
</html>
