<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:url" content="https://wordplay.dev" />
        <meta property="og:type" content="website" />
        <meta
            name="title"
            property="og:title"
            content="Wordplay: Accessible, Multilingual, Programmable Typography"
        />
        <meta
            name="description"
            property="og:description"
            content="An educational programming language for creating interactive typographic media with code."
        />
        <meta
            name="image"
            property="og:image"
            content="https://wordplay.dev/icons/icon.png"
        />
        <meta property="og:image:alt" content="Wordplay chat bubble icon" />
        <link rel="icon" href="%sveltekit.assets%/icons/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="%sveltekit.assets%/icons/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="%sveltekit.assets%/icons/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="%sveltekit.assets%/icons/favicon-16x16.png"
        />
        <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!--
            Warm the DNS + TLS connection to Firestore so the first project
            getDoc (every database/shared project link falls through to one — see
            ProjectsDatabase.get) doesn't pay full connection setup on the
            critical path. crossorigin because Firestore requests are CORS; drop
            it if DevTools reports the preconnect as unused.
        -->
        <link
            rel="preconnect"
            href="https://firestore.googleapis.com"
            crossorigin
        />

        <!--
            Preload the regular + bold Latin Noto Sans slices — the text faces the
            loading overlay waits on before revealing the app (see +layout.svelte,
            which gates the reveal on `document.fonts.load('… "Noto Sans"')`). URLs
            must match the @font-face rules in /fonts.css exactly — including the
            crossorigin attribute — for the browser to reuse the preloaded bytes.

            The all-in-one Noto Emoji file (471 KB, font-display: block) is
            deliberately NOT preloaded: the overlay no longer waits on it, and
            Safari fails to reuse preloaded fonts for the @font-face request, so a
            preload there double-fetches the file (once for the preload, once on
            first emoji render) for no first-paint benefit. It now loads once, on
            demand, when emoji first render.
        -->
        <link
            rel="preload"
            href="/fonts/NotoSans/NotoSans-400-7.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="/fonts/NotoSans/NotoSans-700-7.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />

        <link rel="stylesheet" href="/fonts/fonts.css" />
        <!-- Lazy per-script Noto fallback faces; browsers download a slice
             only when rendered text intersects its unicode-range. -->
        <link rel="stylesheet" href="/fonts/fonts-fallback.css" />

        <style>
            :root {
                /* Light/dark palette pairs. Each raw value is authored exactly
                   once here, then composed by both the light-dark() block and
                   the legacy @media fallback below — so the light and dark
                   values can never drift apart the way the old duplicated dark
                   blocks did (they had, e.g. --color-dark-grey). */
                --blue-light: #648fff;
                --blue-dark: #3a72fe;
                --blue-transparent-light: color-mix(
                    in srgb,
                    var(--blue-light) 10%,
                    transparent
                );
                --blue-transparent-dark: #0f1e45;
                --purple-light: #785ef0;
                --purple-dark: #c7b4ff;
                --purple-transparent-light: color-mix(
                    in srgb,
                    var(--purple-light) 10%,
                    transparent
                );
                --purple-transparent-dark: #261862;
                --pink-light: #dc267f;
                --pink-dark: #ee68a9;
                --pink-transparent-light: color-mix(
                    in srgb,
                    var(--pink-light) 2%,
                    transparent
                );
                --pink-transparent-dark: rgb(77, 15, 45);
                --orange-light: #fe6100;
                --orange-dark: #ff5e00;
                --yellow-light: #c88800;
                --yellow-dark: #b67c00;
                --yellow-transparent-light: #ffb0004b;
                --yellow-transparent-dark: #b67c004b;
                --white-light: #ffffff;
                --white-dark: #000000;
                --black-light: #000000;
                --black-dark: #ffffff;
                --light-grey-light: #9f9f9f;
                --light-grey-dark: #6d6d6d;
                --very-light-grey-light: #f3f3f3;
                --very-light-grey-dark: #1e1e1e;
                --dark-grey-light: #303030;
                --dark-grey-dark: #e1e1e1;
                --shadow-light: rgb(0, 0, 0, 0.2);
                --shadow-dark: rgba(227, 227, 227, 0.8);
                --shadow-transparent-light: rgb(0, 0, 0, 0.05);
                --shadow-transparent-dark: rgba(227, 227, 227, 0.15);

                /* Light defaults, valid on every browser. Modern browsers get
                   these overridden with light-dark() further down; browsers
                   without light-dark() keep these plus the @media dark fallback.
                   light-dark() must NOT live here — a browser that can't parse
                   it would treat var(--color-*) as an invalid color and break
                   every color that uses it. */
                --color-blue: var(--blue-light);
                --color-blue-transparent: var(--blue-transparent-light);
                --color-purple: var(--purple-light);
                --color-purple-transparent: var(--purple-transparent-light);
                --color-pink: var(--pink-light);
                --color-pink-transparent: var(--pink-transparent-light);
                --color-orange: var(--orange-light);
                --color-orange-transparent: #fe61004b;
                --color-yellow: var(--yellow-light);
                --color-yellow-transparent: var(--yellow-transparent-light);
                --color-white: var(--white-light);
                --color-black: var(--black-light);
                --color-light-grey: var(--light-grey-light);
                --color-light-grey-transparent: #9f9f9f36;
                --color-very-light-grey: var(--very-light-grey-light);
                --color-dark-grey: var(--dark-grey-light);
                --color-shadow: var(--shadow-light);
                --color-shadow-transparent: var(--shadow-transparent-light);

                /* Colors */
                --wordplay-foreground: var(--color-black);
                --wordplay-background: var(--color-white);
                --wordplay-header: var(--color-dark-grey);
                --wordplay-chrome: var(--color-light-grey);
                --wordplay-border-color: var(--color-light-grey);
                --wordplay-evaluation-color: var(--color-pink);
                --wordplay-highlight-color: var(--color-yellow);
                /* Link/term text color. Inherits, so a hovered interactive
                   element can flip it to the foreground to stay legible on the
                   gold hover background (see #1216). */
                --wordplay-link-color: var(--wordplay-highlight-color);
                --wordplay-focus-color: var(--color-blue);
                --wordplay-hover: var(--color-yellow);
                --wordplay-hover-light: var(--color-yellow-transparent);
                --wordplay-error: var(--color-orange);
                --wordplay-error-text-color: var(--color-white);
                --wordplay-warning: var(--color-yellow);
                --wordplay-inactive-color: var(--color-light-grey);
                --wordplay-alternating-color: var(--color-very-light-grey);
                --wordplay-doc-color: var(--color-purple);
                --wordplay-doc-color-light: var(--color-purple-transparent);
                --wordplay-relation-color: var(--color-orange);
                --wordplay-operator-color: var(--color-orange);
                --wordplay-type-color: var(--color-orange);

                /* Pastel fills for container-y block kinds. Mixed against the
                   background so they auto-track light/dark mode. */
                --wordplay-block-fill-definition: color-mix(
                    in srgb,
                    var(--color-blue) 15%,
                    var(--wordplay-background)
                );
                --wordplay-block-fill-predicate: color-mix(
                    in srgb,
                    var(--color-pink) 15%,
                    var(--wordplay-background)
                );
                --wordplay-block-fill-evaluate: color-mix(
                    in srgb,
                    var(--color-purple) 15%,
                    var(--wordplay-background)
                );
                --wordplay-block-fill-data: color-mix(
                    in srgb,
                    var(--color-yellow) 15%,
                    var(--wordplay-background)
                );
                --wordplay-block-fill-doc: color-mix(
                    in srgb,
                    var(--color-purple) 15%,
                    var(--wordplay-background)
                );
                --wordplay-block-fill-type: color-mix(
                    in srgb,
                    var(--color-orange) 15%,
                    var(--wordplay-background)
                );

                /* Fonts. Both chains end with the lazy per-script Noto
                   fallbacks (see static/fonts-fallback.css) so glyphs the
                   preloaded faces don't cover fall back to a downloaded-on-
                   demand script font instead of tofu. */
                --wordplay-app-font:
                    'Noto Sans', 'Noto Color Emoji', 'Noto Emoji',
                    var(--wordplay-fallback-fonts), sans-serif;
                --wordplay-code-font:
                    'Noto Sans Mono', 'Noto Sans', 'Noto Color Emoji',
                    'Noto Emoji', var(--wordplay-fallback-fonts), monospace;
                /* Canonical emoji font cascades, shared by Emoji.svelte and
                   EmojisRepaired.svelte. Ordinary color emoji lead with Noto Color
                   Emoji: Safari will NOT fall through a stack led by the OT-SVG
                   keycap face (it drops to the system Apple emoji), so keeping the
                   keycap face out of the general color cascade is required. The
                   keycap face is used ONLY for keycap/legacy runs (which need its
                   glyphs + GSUB ligatures), via --wordplay-emoji-keycap-font. */
                --wordplay-emoji-mono-font: 'Noto Emoji', 'Noto Sans';
                --wordplay-emoji-color-font:
                    'Noto Color Emoji', 'Noto Sans', sans-serif;
                --wordplay-emoji-keycap-font:
                    'Noto Emoji Keycap', 'Noto Color Emoji', 'Noto Sans';

                /* Spacing */
                --wordplay-editor-indent: 3em;
                --wordplay-editor-radius: 3px;
                --wordplay-spacing: 0.5rem;
                --wordplay-spacing-half: 0.25rem;
                /* Block-editor density. Defaults match 'normal'; .editor.density-{compact|spacious} overrides below. */
                --wordplay-block-padding-block: 0.25rem;
                --wordplay-block-padding-inline: 0.25rem;
                --wordplay-block-insertion-margin: 0.25rem;
                --wordplay-block-stack-gap: var(--wordplay-spacing-half);
                --wordplay-font-weight: 400;
                --wordplay-font-size: 12pt;
                --wordplay-small-font-size: 10pt;
                --wordplay-border-width: 1px;
                --wordplay-focus-width: 4px;
                --wordplay-border-radius: 8px;
                --wordplay-code-line-height: 1.6;
                --wordplay-palette-min-width: 5em;
                --wordplay-palette-max-width: 15em;
                --wordplay-widget-height: 1.5em;
                --wordplay-min-line-height: 3ex;

                --bounce-height: 0.2em;
                --wobble-rotation: 2deg;

                --animation-factor: 1;
            }

            @media (prefers-reduced-motion: reduce) {
                :root {
                    --animation-factor: 0;
                }
            }

            /* Block-editor density overrides. Vertical compresses more aggressively
               than horizontal because 2px horizontal padding cramps adjacent tokens. */
            .editor.density-compact {
                --wordplay-block-padding-block: 0.125rem;
                --wordplay-block-padding-inline: 0.25rem;
                --wordplay-block-insertion-margin: 0.125rem;
                /* Compact blocks lose internal vertical padding, so add 1px to
                   the inter-block gap to keep stacked blocks visually distinct. */
                --wordplay-block-stack-gap: calc(
                    var(--wordplay-spacing-half) + 1px
                );
            }
            .editor.density-spacious {
                --wordplay-block-padding-block: 0.5rem;
                --wordplay-block-padding-inline: 0.5rem;
                --wordplay-block-insertion-margin: 0.5rem;
            }

            /* Modern browsers: color-scheme + light-dark() give the OS-driven
               default AND let JS force a mode by setting the color-scheme
               property on <html> (see +layout.svelte). All values come from the
               single-source pairs above, so there is nothing to keep in sync. */
            @supports (color: light-dark(#000, #fff)) {
                :root {
                    color-scheme: light dark;
                    --color-blue: light-dark(
                        var(--blue-light),
                        var(--blue-dark)
                    );
                    --color-blue-transparent: light-dark(
                        var(--blue-transparent-light),
                        var(--blue-transparent-dark)
                    );
                    --color-purple: light-dark(
                        var(--purple-light),
                        var(--purple-dark)
                    );
                    --color-purple-transparent: light-dark(
                        var(--purple-transparent-light),
                        var(--purple-transparent-dark)
                    );
                    --color-pink: light-dark(
                        var(--pink-light),
                        var(--pink-dark)
                    );
                    --color-pink-transparent: light-dark(
                        var(--pink-transparent-light),
                        var(--pink-transparent-dark)
                    );
                    --color-orange: light-dark(
                        var(--orange-light),
                        var(--orange-dark)
                    );
                    --color-yellow: light-dark(
                        var(--yellow-light),
                        var(--yellow-dark)
                    );
                    --color-yellow-transparent: light-dark(
                        var(--yellow-transparent-light),
                        var(--yellow-transparent-dark)
                    );
                    --color-white: light-dark(
                        var(--white-light),
                        var(--white-dark)
                    );
                    --color-black: light-dark(
                        var(--black-light),
                        var(--black-dark)
                    );
                    --color-light-grey: light-dark(
                        var(--light-grey-light),
                        var(--light-grey-dark)
                    );
                    --color-very-light-grey: light-dark(
                        var(--very-light-grey-light),
                        var(--very-light-grey-dark)
                    );
                    --color-dark-grey: light-dark(
                        var(--dark-grey-light),
                        var(--dark-grey-dark)
                    );
                    --color-shadow: light-dark(
                        var(--shadow-light),
                        var(--shadow-dark)
                    );
                    --color-shadow-transparent: light-dark(
                        var(--shadow-transparent-light),
                        var(--shadow-transparent-dark)
                    );
                }
            }

            /* Legacy fallback: browsers without light-dark() still get OS-driven
               dark mode (they can't honor a forced override — acceptable
               degradation). @supports-not gates it so modern browsers, which go
               dark via light-dark() above, never apply it — otherwise it would
               re-darken a user who forced light on an OS-dark machine. */
            @supports not (color: light-dark(#000, #fff)) {
                @media (prefers-color-scheme: dark) {
                    :root {
                        --color-blue: var(--blue-dark);
                        --color-blue-transparent: var(--blue-transparent-dark);
                        --color-purple: var(--purple-dark);
                        --color-purple-transparent: var(
                            --purple-transparent-dark
                        );
                        --color-pink: var(--pink-dark);
                        --color-pink-transparent: var(--pink-transparent-dark);
                        --color-orange: var(--orange-dark);
                        --color-yellow: var(--yellow-dark);
                        --color-yellow-transparent: var(
                            --yellow-transparent-dark
                        );
                        --color-white: var(--white-dark);
                        --color-black: var(--black-dark);
                        --color-light-grey: var(--light-grey-dark);
                        --color-very-light-grey: var(--very-light-grey-dark);
                        --color-dark-grey: var(--dark-grey-dark);
                        --color-shadow: var(--shadow-dark);
                        --color-shadow-transparent: var(
                            --shadow-transparent-dark
                        );
                    }
                }
            }

            @keyframes wobble {
                0% {
                    transform: rotate(var(--wobble-rotation));
                }
                50% {
                    transform: rotate(calc(-1 * var(--wobble-rotation)));
                }
                100% {
                    transform: rotate(var(--wobble-rotation));
                }
            }

            @keyframes throb {
                0% {
                    opacity: 0.8;
                }
                50% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.8;
                }
            }

            @keyframes shift {
                0% {
                    transform: translateX(2px);
                }
                50% {
                    transform: translateX(-2px);
                }
                100% {
                    transform: translateX(2px);
                }
            }

            @keyframes bounce {
                0% {
                    transform: scale(1, 1) translateY(0);
                }
                10% {
                    transform: scale(1.1, 0.9) translateY(0);
                }
                30% {
                    transform: scale(0.9, 1.1)
                        translateY(calc(-1 * var(--bounce-height)));
                }
                50% {
                    transform: scale(1.05, 0.95) translateY(0);
                }
                57% {
                    transform: scale(1, 1) translateY(-7px);
                }
                64% {
                    transform: scale(1, 1) translateY(0);
                }
                100% {
                    transform: scale(1, 1) translateY(0);
                }
            }

            @keyframes ybounce {
                0% {
                    transform: scaleY(1) translateY(0);
                }
                10% {
                    transform: scaleY(0.9) translateY(0);
                }
                30% {
                    transform: scaleY(1.1)
                        translateY(calc(-1 * var(--bounce-height)));
                }
                50% {
                    transform: scaleY(0.95) translateY(0);
                }
                57% {
                    transform: scaleY(1) translateY(-7px);
                }
                64% {
                    transform: scaleY(1) translateY(0);
                }
                100% {
                    transform: scaleY(1) translateY(0);
                }
            }

            @keyframes pulse {
                0% {
                    stroke-width: var(--wordplay-focus-width);
                }

                70% {
                    stroke-width: var(--wordplay-border-width);
                }

                100% {
                    stroke-width: var(--wordplay-focus-width);
                }
            }

            @keyframes shake {
                10%,
                90% {
                    transform: translate3d(-1px, 0, 0);
                }

                20%,
                80% {
                    transform: translate3d(2px, 0, 0);
                }

                30%,
                50%,
                70% {
                    transform: translate3d(-4px, 0, 0);
                }

                40%,
                60% {
                    transform: translate3d(4px, 0, 0);
                }
            }

            @keyframes squish {
                10%,
                90% {
                    transform: translate3d(0, -1px, 0);
                }
                20%,
                80% {
                    transform: translate3d(0px, 2px, 0);
                }
                30%,
                50%,
                70% {
                    transform: translate3d(0, -4px, 0) scale(1, 1.25);
                }
                40%,
                60% {
                    transform: translate3d(0, 4px, 0) scale(1, 0.5);
                }
            }

            /* Applied by locale-preload.js when the preferred locale is not en-US,
               removed by +layout.svelte once the correct locale has loaded. */
            html.locale-loading > body {
                visibility: hidden;
            }

            body {
                background-color: var(--wordplay-background);
                padding: 0;
                margin: 0;
            }

            html {
                box-sizing: border-box;
            }

            * {
                box-sizing: inherit;
            }

            h1,
            h2,
            h3 {
                margin-bottom: var(--wordplay-spacing);
                margin-top: 0;
                transform: rotate(-1deg);
            }

            h1:not(:first-of-type),
            h2:not(:first-of-type),
            h3:not(:first-of-type) {
                margin-top: calc(2 * var(--wordplay-spacing));
                font-weight: bold;
            }

            h1 {
                font-size: calc(var(--wordplay-font-size) + 3pt);
            }

            h2 {
                font-size: calc(var(--wordplay-font-size) + 1pt);
            }

            h3 {
                font-size: var(--wordplay-font-size);
                font-style: italic;
                font-weight: normal;
            }

            p {
                margin-block-start: 0;
                margin-block-end: 1.5em;
            }

            p:last-child {
                margin-block-end: 0;
            }

            p,
            li {
                line-height: 1.5;
            }

            li:not(:last-of-type) {
                margin-block-end: var(--wordplay-spacing-half);
            }

            *:focus {
                outline: var(--wordplay-focus-color) solid
                    var(--wordplay-focus-width);
            }

            body:focus {
                outline: none;
            }

            table {
                border-collapse: collapse;
                border: var(--wordplay-border-color) solid
                    var(--wordplay-border-width);
            }

            td,
            th {
                padding: var(--wordplay-spacing);
                text-align: start;
            }

            th {
                font-weight: normal;
                font-style: italic;
            }

            tr:nth-child(odd) {
                background: var(--wordplay-alternating-color);
            }

            noscript {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                gap: calc(var(--wordplay-spacing) / 3);
                font-family: var(--wordplay-app-font);
                color: var(--wordplay-foreground);
            }

            noscript h1 {
                font-size: min(10vw, 60pt);
                margin: 0;
                text-align: center;
            }

            noscript .emoji {
                font-family: 'Noto Emoji', 'Noto Sans';
                font-weight: 400;
                font-style: normal;
            }

            noscript p {
                margin: 0;
                max-width: 30rem;
                padding: var(--wordplay-spacing);
                text-align: center;
                font-size: var(--wordplay-font-size);
            }

            hr {
                width: 100%;
                height: var(--wordplay-border-width);
                border: none;
                border-bottom: var(--wordplay-border-width) solid
                    var(--wordplay-border-color);
            }

            a {
                color: var(--wordplay-link-color);
                text-decoration: none;
                /* In case a parent disables pointer events, we need to enable them here. */
                pointer-events: auto;
            }

            /* Links in paragraphs should have underlines for visibility. */
            p > a {
                text-decoration: calc(var(--wordplay-focus-width) / 2) underline
                    var(--wordplay-link-color);
            }

            a:focus,
            a:hover {
                outline: none;
                text-decoration: underline;
                text-decoration-thickness: var(--wordplay-focus-width);
                text-decoration-color: var(--wordplay-focus-color);
            }
        </style>

        %sveltekit.head%
    </head>
    <body>
        <noscript>
            <!--
                Styles inside <noscript> are only applied when JavaScript is
                disabled, so this hides the prerendered app and unsupported
                fallback so only the localized noscript message is visible.
            -->
            <style>
                #wordplay-app,
                #unsupported {
                    display: none !important;
                }
            </style>
            <h1><span class="emoji">💬</span>%wordplay.wordplay%</h1>
            <p>%wordplay.system.noscript%</p>
        </noscript>
        <script src="/scripts/locale-preload.js"></script>
        <div id="wordplay-app">%sveltekit.body%</div>
        <div id="unsupported" style="display: none; margin: 1em">
            <h1>%wordplay.system.unsupportedHeading%</h1>
            <p>%wordplay.system.unsupportedBody%</p>
        </div>
        <script src="/scripts/unsupported.js"></script>
    </body>
</html>
